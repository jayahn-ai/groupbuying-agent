<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공동구매 에이전트</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #e8e8f2;
      --card:       #ffffff;
      --grad-start: #6c63ff;
      --grad-end:   #c084fc;
      --user-start: #5b5ef4;
      --user-end:   #d946ef;
      --text-dark:  #1e1e2e;
      --text-mid:   #4a4a6a;
      --text-light: #9090b0;
      --chip-bg:    #ececf5;
      --chip-border:#d8d8ec;
      --shadow:     0 8px 32px rgba(100,80,200,0.10);
      --shadow-sm:  0 2px 12px rgba(100,80,200,0.07);
      --success:    #059669;
      --warning:    #d97706;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-dark);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(140,120,255,0.13) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(200,130,255,0.10) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ── Shell ── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 16px;
      gap: 12px;
      position: relative;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 16px rgba(108,99,255,0.35);
      flex-shrink: 0;
    }
    .topbar-info h1 {
      font-size: 15px; font-weight: 700; color: var(--text-dark);
    }
    .topbar-info p {
      font-size: 11px; color: var(--text-light); margin-top: 1px;
    }
    .topbar-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
    }
    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #6ee7b7;
      box-shadow: 0 0 6px #6ee7b7aa;
      animation: breathe 2.4s infinite;
    }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:.4} }
    .online-label { font-size: 11px; color: var(--text-light); }

    /* ── Webhook config ── */
    .webhook-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--card);
      border-radius: 12px;
      padding: 8px 14px;
      box-shadow: var(--shadow-sm);
    }
    .webhook-row label {
      font-size: 10px; font-weight: 600;
      color: var(--text-light);
      letter-spacing: .5px;
      white-space: nowrap;
      font-variant: small-caps;
    }
    .webhook-row input {
      flex: 1;
      border: none; outline: none;
      background: transparent;
      font-size: 11px;
      color: var(--text-mid);
      font-family: 'Noto Sans KR', monospace;
    }
    .webhook-row input::placeholder { color: #c0c0d8; }

    /* ── Session badge ── */
    .session-banner {
      display: none;
      align-items: center;
      gap: 7px;
      background: linear-gradient(90deg, rgba(5,150,105,.08), rgba(5,150,105,.03));
      border: 1px solid rgba(5,150,105,.25);
      border-radius: 10px;
      padding: 7px 14px;
      box-shadow: var(--shadow-sm);
    }
    /* animation is on .visible so it fires each time the banner appears */
    .session-banner.visible {
      display: flex;
      animation: fadeUp .22s ease both;
    }
    .session-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 5px rgba(5,150,105,.5);
      animation: breathe 2s infinite;
      flex-shrink: 0;
    }
    .session-banner span {
      font-size: 11px; color: var(--success); font-weight: 600; flex: 1;
    }
    .session-clear-btn {
      font-size: 10px;
      background: none; border: none;
      color: var(--text-light); cursor: pointer;
      padding: 2px 5px; border-radius: 4px;
      transition: color .15s;
    }
    .session-clear-btn:hover { color: #c0304a; }

    /* ── Chat card ── */
    .chat-card {
      flex: 1;
      min-height: 0;
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: #d0d0e8; border-radius: 4px; }

    /* ── Welcome ── */
    .welcome {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 48px 16px 16px;
      gap: 0;
    }
    .welcome-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      box-shadow: 0 8px 28px rgba(108,99,255,0.35);
      margin-bottom: 4px;
    }
    .welcome h2 { font-size: 17px; font-weight: 700; color: var(--text-dark); }
    .welcome p  { font-size: 13px; color: var(--text-light); line-height: 1.7; }

    .suggest-list {
      width: 100%;
      max-width: 400px;
      display: flex; flex-direction: column;
      gap: 2px;
      margin-top: 8px;
    }
    .suggest-item {
      padding: 11px 16px;
      border-radius: 10px;
      font-size: 13px;
      color: var(--text-mid);
      cursor: pointer;
      transition: background .16s;
      text-align: left;
    }
    .suggest-item:hover { background: var(--chip-bg); }
    .suggest-item.active {
      background: linear-gradient(90deg, var(--user-start), var(--user-end));
      color: #fff;
      font-weight: 600;
    }

    /* ── Message rows ── */
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      box-shadow: 0 3px 10px rgba(108,99,255,0.3);
      margin-top: 2px;
    }

    .bubble {
      max-width: 75%;
      line-height: 1.75;
      font-size: 13.5px;
    }
    .msg.bot .bubble {
      background: #f6f6fc;
      border-radius: 4px 18px 18px 18px;
      padding: 14px 18px;
      color: var(--text-dark);
      box-shadow: var(--shadow-sm);
    }
    .msg.user .bubble {
      width: fit-content;
      max-width: 75%;
      background: linear-gradient(135deg, var(--user-start), var(--user-end));
      border-radius: 18px 4px 18px 18px;
      padding: 11px 20px;
      color: #fff;
      font-weight: 500;
      box-shadow: 0 4px 18px rgba(91,94,244,0.28);
      white-space: nowrap;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    /* 내용이 길면 자동으로 줄바꿈 */
    .msg.user .bubble.wrap {
      white-space: normal;
    }

    /* file upload message bubble */
    .msg.system .bubble {
      background: linear-gradient(90deg, rgba(5,150,105,.06), rgba(5,150,105,.02));
      border: 1px solid rgba(5,150,105,.2);
      border-radius: 4px 18px 18px 18px;
      padding: 11px 18px;
      color: var(--success);
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-sm);
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-light);
      margin-top: 5px;
      padding: 0 4px;
    }
    .msg.user .msg-time { text-align: right; }

    .token-badge {
      display: inline-block;
      font-size: 10px;
      background: var(--chip-bg);
      color: var(--text-light);
      border-radius: 6px;
      padding: 2px 7px;
      margin-top: 4px;
    }

    /* ── Typing indicator ── */
    .typing-row { display: flex; gap: 10px; align-items: center; }
    .typing-text {
      font-size: 13px; color: var(--text-light);
      display: flex; align-items: center; gap: 8px;
      padding: 10px 0;
    }
    .spin {
      width: 14px; height: 14px;
      border: 2px solid var(--chip-border);
      border-top-color: var(--grad-start);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error bubble ── */
    .bubble.error {
      background: #fff0f3;
      color: #c0304a;
      border: 1px solid #ffd0da;
      border-radius: 4px 18px 18px 18px;
      padding: 14px 18px;
      font-size: 13px;
    }

    /* ── Input area ── */
    .input-area {
      border-top: 1px solid #f0f0f8;
      padding: 14px 20px 18px;
      display: flex; flex-direction: column; gap: 10px;
    }

    /* ── Input row ── */
    .input-row {
      display: flex; align-items: flex-end; gap: 10px;
    }

    .input-box {
      flex: 1;
      background: var(--chip-bg);
      border: 1.5px solid transparent;
      border-radius: 14px;
      padding: 11px 16px;
      transition: border-color .2s;
    }
    .input-box:focus-within { border-color: var(--grad-start); }

    textarea {
      width: 100%;
      background: none; border: none; outline: none; resize: none;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13.5px;
      color: var(--text-dark);
      line-height: 1.5;
      max-height: 100px;
      min-height: 20px;
    }
    textarea::placeholder { color: #b0b0cc; }

    .send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--text-dark);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, opacity .15s;
      box-shadow: 0 4px 14px rgba(30,30,50,0.25);
    }
    .send-btn:hover { transform: scale(1.07); }
    .send-btn:active { transform: scale(0.94); }
    .send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 17px; height: 17px; fill: #fff; }

    /* ── fade-up anim ── */
    .fadein { animation: fadeUp .22s ease both; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(7px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* bold / code in bot bubble */
    .bubble strong { color: var(--grad-start); font-weight: 600; }
    .bubble code {
      font-size: 12px; background: #ececf8;
      padding: 1px 5px; border-radius: 4px;
      color: var(--grad-start);
    }

    /* ── Keyword chips ── */
    .keyword-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      margin-top: 10px;
    }
    .keyword-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }
    .keyword-title .kw-sparkle {
      flex-shrink: 0;
    }
    .keyword-chips {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .keyword-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .keyword-chip {
      padding: 9px 18px;
      border-radius: 999px;
      border: 1.5px solid var(--chip-border);
      background: var(--card);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-mid);
      cursor: pointer;
      transition: border-color .18s, background .18s, color .18s, transform .12s, box-shadow .18s;
      box-shadow: var(--shadow-sm);
      font-family: 'Noto Sans KR', sans-serif;
    }
    .keyword-chip:hover {
      border-color: var(--grad-start);
      background: linear-gradient(135deg, rgba(108,99,255,0.07), rgba(192,132,252,0.07));
      color: var(--grad-start);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(108,99,255,0.15);
    }
    .keyword-chip:active { transform: scale(0.96) translateY(0); }
  </style>
</head>
<body>
<div class="shell">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-avatar">✦</div>
    <div class="topbar-info">
      <h1>공동구매 에이전트</h1>
    </div>
    <div class="topbar-right">
      <div class="online-dot"></div>
      <span class="online-label">연결됨</span>
    </div>
  </div>

  <!-- Session banner (hidden until session_id is received) -->
  <div class="session-banner" id="sessionBanner">
    <div class="session-dot"></div>
    <span id="sessionLabel">정산 세션 활성 중 — 다음 질문에 자동으로 session_id가 포함됩니다.</span>
    <button class="session-clear-btn" onclick="clearSession()" title="세션 초기화">세션 초기화 ✕</button>
  </div>

  <!-- Chat card -->
  <div class="chat-card">
    <div class="messages" id="messages">

      <!-- Welcome screen -->
      <div class="welcome" id="welcomeScreen">

        <div class="keyword-section">
          <div class="keyword-title">
            <span class="kw-sparkle">
              <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="spkGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#6c63ff"/>
                    <stop offset="100%" stop-color="#c084fc"/>
                  </linearGradient>
                </defs>
                <!-- large 4-point star -->
                <path d="M18 2 C18 2 19.6 10.4 22 13 C24.4 15.6 32 18 32 18 C32 18 24.4 20.4 22 23 C19.6 25.6 18 34 18 34 C18 34 16.4 25.6 14 23 C11.6 20.4 4 18 4 18 C4 18 11.6 15.6 14 13 C16.4 10.4 18 2 18 2Z" fill="url(#spkGrad)"/>
                <!-- small top-right star -->
                <path d="M28 3 C28 3 28.7 6.3 29.8 7.4 C30.9 8.5 34 9 34 9 C34 9 30.9 9.5 29.8 10.6 C28.7 11.7 28 15 28 15 C28 15 27.3 11.7 26.2 10.6 C25.1 9.5 22 9 22 9 C22 9 25.1 8.5 26.2 7.4 C27.3 6.3 28 3 28 3Z" fill="url(#spkGrad)" opacity="0.75"/>
                <!-- tiny top-left dot star -->
                <path d="M8 5 C8 5 8.4 6.8 9 7.4 C9.6 8 11.2 8.4 11.2 8.4 C11.2 8.4 9.6 8.8 9 9.4 C8.4 10 8 12 8 12 C8 12 7.6 10 7 9.4 C6.4 8.8 4.8 8.4 4.8 8.4 C4.8 8.4 6.4 8 7 7.4 C7.6 6.8 8 5 8 5Z" fill="url(#spkGrad)" opacity="0.55"/>
              </svg>
            </span>
            자주 묻는 키워드
          </div>
          <div class="keyword-chips">
            <div class="keyword-row">
              <button class="keyword-chip" onclick="fillKeyword('지금 컨택하기 가장 좋은 인플루언서 누구야?')">인플루언서 추천</button>
              <button class="keyword-chip" onclick="fillKeyword('공구 시뮬레이션 돌려줘')">공구 시뮬레이션</button>
            </div>
            <div class="keyword-row">
              <button class="keyword-chip" onclick="fillKeyword('정산 리포트 만들어줘')">정산</button>
              <button class="keyword-chip" onclick="fillKeyword('정산 메일 보내줘')">정산 메일 보내기</button>
              <button class="keyword-chip" onclick="fillKeyword('자사 브랜드 공구 가이드 알려줘')">공구 가이드</button>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Input area -->
    <div class="input-area">

      <!-- Input row -->
      <div class="input-row">
        <div class="input-box">
          <textarea id="queryInput" rows="1"
            placeholder="질문을 입력해주세요..."
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>

    </div>
  </div>

</div>

<script>
  /* ══════════════════════════════════════
     State
  ══════════════════════════════════════ */
  let isLoading     = false;
  let currentSessionId = '';         // session_id received from settlement branch

  const WEBHOOK_URL = 'https://n8n.srv1001864.hstgr.cloud/webhook/influencer-query';

  const msgArea    = document.getElementById('messages');
  const input      = document.getElementById('queryInput');
  const sendBtn    = document.getElementById('sendBtn');

  // 페이지 로드 완료
  const sessionBanner = document.getElementById('sessionBanner');
  const sessionLabel  = document.getElementById('sessionLabel');

  /* ══════════════════════════════════════
     Utilities
  ══════════════════════════════════════ */
  function now() {
    return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  }
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }
  function scrollBottom() { msgArea.scrollTop = msgArea.scrollHeight; }
  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmt(t) {
    return escHtml(t)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br/>');
  }
  /* ══════════════════════════════════════
     Session ID management
  ══════════════════════════════════════ */
  function saveSession(id) {
    if (!id || id.trim() === '') return;
    currentSessionId = id.trim();
    sessionLabel.textContent =
      `📋 정산 세션 활성 — session_id: ${currentSessionId.slice(0,28)}…`;
    sessionBanner.classList.add('visible');
  }

  function clearSession() {
    currentSessionId = '';
    sessionBanner.classList.remove('visible');
  }

  /* ══════════════════════════════════════
     Chat helpers
  ══════════════════════════════════════ */
  function fillQuery(text) {
    input.value = text;
    input.focus();
    autoResize(input);
  }

  function fillKeyword(text) {
    input.value = text;
    input.focus();
    autoResize(input);
  }

  function pick(el, text) {
    document.querySelectorAll('.suggest-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    fillQuery(text);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function removeWelcome() {
    const w = document.getElementById('welcomeScreen');
    if (w) w.remove();
  }

  /* ── Append user bubble ── */
  function appendUser(text) {
    removeWelcome();
    const d = document.createElement('div');
    d.className = 'msg user fadein';
    const wrapClass = text.length > 20 ? 'wrap' : '';
    d.innerHTML = `
      <div>
        <div class="bubble ${wrapClass}">${escHtml(text)}</div>
        <div class="msg-time">${now()}</div>
      </div>`;
    msgArea.appendChild(d);
    scrollBottom();
  }

  /* ── System / upload bubble ── */
  function appendSystem(htmlText) {
    removeWelcome();
    const d = document.createElement('div');
    d.className = 'msg system fadein';
    d.innerHTML = `
      <div class="msg-avatar">✦</div>
      <div>
        <div class="bubble">${htmlText}</div>
        <div class="msg-time">${now()}</div>
      </div>`;
    msgArea.appendChild(d);
    scrollBottom();
  }

  /* ── Typing indicator ── */
  function showTyping() {
    const d = document.createElement('div');
    d.className = 'typing-row fadein';
    d.id = 'typing';
    d.innerHTML = `
      <div class="msg-avatar">✦</div>
      <div class="typing-text">
        <div class="spin"></div>
        분석 중, 잠시만 기다려 주세요...
      </div>`;
    msgArea.appendChild(d);
    scrollBottom();
  }
  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  /* ── Append bot bubble ── */
  function appendBot(text, tokens, isError = false) {
    const d = document.createElement('div');
    d.className = 'msg bot fadein';
    const tokenHtml = (tokens && !isError)
      ? `<span class="token-badge">output tokens: ${tokens}</span>` : '';
    d.innerHTML = `
      <div class="msg-avatar">✦</div>
      <div>
        <div class="bubble ${isError ? 'error' : ''}">${isError ? escHtml(text).replace(/\n/g,'<br/>') : fmt(text)}</div>
        <div class="msg-time">${now()} ${tokenHtml}</div>
      </div>`;
    msgArea.appendChild(d);
    scrollBottom();
  }

  /* ══════════════════════════════════════
     Send message
  ══════════════════════════════════════ */
  async function sendMessage() {
    if (isLoading) return;
    const query = input.value.trim();
    if (!query) return;

    const url = WEBHOOK_URL;
    if (!url) {
      alert('WEBHOOK_URL이 설정되지 않았습니다.');
      return;
    }

    isLoading = true;
    sendBtn.disabled = true;
    input.value = '';
    autoResize(input);

    appendUser(query);
    showTyping();

    // Build request body — always include session_id (empty string if none)
    const body = {
      query,
      session_id: currentSessionId   // '' if no active session
    };

    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      removeTyping();

      if (!res.ok) {
        const msg = await res.text();
        throw new Error(`HTTP ${res.status} — ${msg || res.statusText}`);
      }

      const data = await res.json();

      // ── Handle session_id from settlement branch ──
      if (data.session_id && data.session_id.trim() !== '') {
        saveSession(data.session_id);
      }

      // ── Auto-clear session after settlement_confirm succeeds ──
      // n8n may return session_id as "", undefined, or null for non-settlement branches.
      // Use falsy check to handle all three cases safely.
      const noSessionInResponse = !data.session_id || data.session_id.trim() === '';
      if (noSessionInResponse && currentSessionId !== '') {
        if (data.answer && /발송.*완료|메일.*발송|전송.*완료/.test(data.answer)) {
          clearSession();
        }
      }

      if (data.answer || data.message) {
        appendBot(data.answer || data.message, data.tokens_used);
      } else if (data.error) {
        appendBot(`오류: ${data.error}`, null, true);
      } else {
        appendBot('응답 형식을 확인할 수 없습니다.\nn8n 워크플로우 출력을 확인해주세요.', null, true);
      }

    } catch (err) {
      removeTyping();
      let msg = err.message || '알 수 없는 오류가 발생했습니다.';
      if (msg.includes('Failed to fetch')) {
        msg = 'Webhook에 연결할 수 없습니다.\n• URL이 올바른지 확인해주세요.\n• n8n 워크플로우가 Activate 상태인지 확인해주세요.';
      }
      appendBot(msg, null, true);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>
